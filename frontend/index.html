<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成本计算工具</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 加载动画 -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>加载中...</p>
    </div>

    <!-- 顶部导航 -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 7H6C4.89543 7 4 7.89543 4 9V18C4 19.1046 4.89543 20 6 20H18C19.1046 20 20 19.1046 20 18V9C20 7.89543 19.1046 7 18 7H15M9 7V5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7M9 7H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    成本计算工具
                </h1>
                <nav class="nav">
                    <button class="nav-btn active" data-tab="products">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 7H4M20 12H4M20 17H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        商品管理
                    </button>
                    <button class="nav-btn" data-tab="materials">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        原料管理
                    </button>
                    <button class="nav-btn" data-tab="calculator">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M8 6H16M8 10H12M8 14H12M8 18H12M14 14H16M14 18H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        成本计算
                    </button>
                    <button class="nav-btn" data-tab="history">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2V6M12 18V22M4.92993 4.92993L7.7584 7.7584M16.2426 16.2426L19.0711 19.0711M2 12H6M18 12H22M4.92993 19.0711L7.7584 16.2426M16.2426 7.7584L19.0711 4.92993" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        计算历史
                    </button>
                    <button class="nav-btn" data-tab="rules">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 12L11 14L15 10M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        规则管理
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="main">
        <div class="container">
            <!-- 商品管理 -->
            <section id="tab-products" class="tab-content active">
                <div class="section-header">
                    <h2>商品管理</h2>
                    <button class="btn btn-primary" onclick="openProductModal()">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        添加商品
                    </button>
                </div>
                <div id="products-list" class="card-grid"></div>
            </section>

            <!-- 原料管理 -->
            <section id="tab-materials" class="tab-content">
                <div class="section-header">
                    <h2>原料管理</h2>
                    <button class="btn btn-primary" onclick="openMaterialModal()">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        添加原料
                    </button>
                </div>
                <div id="materials-list" class="card-grid"></div>
            </section>

            <!-- 成本计算 -->
            <section id="tab-calculator" class="tab-content">
                <div class="section-header">
                    <h2>成本计算</h2>
                </div>
                <div class="calculator-container">
                    <!-- 左侧：单个计算 -->
                    <div class="card">
                        <h3>单个商品计算</h3>
                        <div class="form-group">
                            <label for="calc-product">选择商品</label>
                            <select id="calc-product" class="form-control">
                                <option value="">请选择商品</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="calc-quantity">数量</label>
                            <input type="number" id="calc-quantity" class="form-control" value="1" min="1">
                        </div>
                        <button class="btn btn-primary" style="width: 100%;" onclick="calculateCost()">计算单个商品</button>
                    </div>
                    <!-- 中间：批量计算 -->
                    <div class="card">
                        <h3>批量计算</h3>
                        <div class="form-group">
                            <label>选择商品并设置数量</label>
                            <div id="batch-products" class="batch-product-list"></div>
                        </div>
                        <div class="btn-group" style="width: 100%;">
                            <button class="btn btn-secondary" style="flex: 1;" onclick="clearBatchSelection()">清空选择</button>
                            <button class="btn btn-primary" style="flex: 1;" onclick="calculateBatchCost()">批量计算</button>
                        </div>
                    </div>
                    <!-- 右侧：计算结果 -->
                    <div class="card">
                        <h3>计算结果</h3>
                        <div id="calc-result" class="calc-result">
                            <p class="placeholder">请选择商品并点击计算</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 计算历史 -->
            <section id="tab-history" class="tab-content">
                <div class="section-header">
                    <h2>计算历史</h2>
                </div>
                <div id="history-list" class="table-container"></div>
            </section>

            <!-- 规则管理 -->
            <section id="tab-rules" class="tab-content">
                <div class="section-header">
                    <h2>规则管理</h2>
                    <button class="btn btn-primary" onclick="openRuleModal()">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        添加规则
                    </button>
                </div>
                <div id="rules-list" class="card-grid"></div>
            </section>
        </div>
    </main>

    <!-- 模态框 - 商品 -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="product-modal-title">添加商品</h3>
                <button class="modal-close" onclick="closeProductModal()">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="product-form">
                    <input type="hidden" id="product-id">
                    <div class="form-group">
                        <label for="product-name">商品名称 *</label>
                        <input type="text" id="product-name" class="form-control" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-labor">人工成本</label>
                            <input type="number" id="product-labor" class="form-control" value="0" step="0.01" min="0">
                        </div>
                        <div class="form-group">
                            <label for="product-tax">税率</label>
                            <input type="number" id="product-tax" class="form-control" value="0" step="0.01" min="0" max="1">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="product-desc">描述</label>
                        <textarea id="product-desc" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>配方（原料及用量）</label>
                        <div id="recipe-list" class="recipe-list"></div>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="addRecipeRow()">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            添加原料
                        </button>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeProductModal()">取消</button>
                <button class="btn btn-primary" onclick="saveProduct()">保存</button>
            </div>
        </div>
    </div>

    <!-- 模态框 - 原料 -->
    <div id="material-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="material-modal-title">添加原料</h3>
                <button class="modal-close" onclick="closeMaterialModal()">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="material-form">
                    <input type="hidden" id="material-id">
                    <div class="form-group">
                        <label for="material-name">原料名称 *</label>
                        <input type="text" id="material-name" class="form-control" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="material-unit">单位 *</label>
                            <input type="text" id="material-unit" class="form-control" required placeholder="如：kg、个、米">
                        </div>
                        <div class="form-group">
                            <label for="material-price">单价 *</label>
                            <input type="number" id="material-price" class="form-control" required step="0.01" min="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="material-desc">描述</label>
                        <textarea id="material-desc" class="form-control" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeMaterialModal()">取消</button>
                <button class="btn btn-primary" onclick="saveMaterial()">保存</button>
            </div>
        </div>
    </div>

    <!-- 模态框 - 规则 -->
    <div id="rule-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="rule-modal-title">添加规则</h3>
                <button class="modal-close" onclick="closeRuleModal()">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="rule-form">
                    <input type="hidden" id="rule-id">
                    <div class="form-group">
                        <label for="rule-name">规则名称 *</label>
                        <input type="text" id="rule-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="rule-type">规则类型 *</label>
                        <select id="rule-type" class="form-control" required onchange="updateRuleForm()">
                            <option value="quantity_discount">数量折扣</option>
                            <option value="total_cost_discount">总成本折扣</option>
                        </select>
                    </div>
                    <div id="rule-conditions">
                        <div class="form-group" id="condition-quantity">
                            <label for="rule-min-quantity">最低数量 *</label>
                            <input type="number" id="rule-min-quantity" class="form-control" min="1">
                        </div>
                        <div class="form-group" id="condition-cost" style="display: none;">
                            <label for="rule-min-cost">最低成本 *</label>
                            <input type="number" id="rule-min-cost" class="form-control" step="0.01" min="0">
                        </div>
                    </div>
                    <div id="rule-actions">
                        <div class="form-group" id="action-unit-discount">
                            <label for="rule-discount-unit">每单位优惠金额 *</label>
                            <input type="number" id="rule-discount-unit" class="form-control" step="0.01" min="0">
                        </div>
                        <div class="form-group" id="action-percent-discount" style="display: none;">
                            <label for="rule-discount-percent">折扣比例 *</label>
                            <input type="number" id="rule-discount-percent" class="form-control" step="0.01" min="0" max="1" placeholder="0.05 表示 5%">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="rule-priority">优先级</label>
                            <input type="number" id="rule-priority" class="form-control" value="1" min="0">
                        </div>
                        <div class="form-group">
                            <label for="rule-active">状态</label>
                            <select id="rule-active" class="form-control">
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="rule-desc">描述</label>
                        <textarea id="rule-desc" class="form-control" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeRuleModal()">取消</button>
                <button class="btn btn-primary" onclick="saveRule()">保存</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
